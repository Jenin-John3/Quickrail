<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickRail | Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #0f172a 0%, #020617 100%);
        }

        /* Ambient blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(160px);
            z-index: 0;
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 68px;
            height: 68px;
            background: var(--primary-glow);
            border-radius: 20px;
            margin-bottom: 1.4rem;
            border: 1px solid var(--glass-border);
        }

        .divider {
            height: 2px;
            width: 36px;
            background: var(--primary);
            border-radius: 2px;
            margin: 0.6rem auto 1rem;
        }

        .input-wrap {
            position: relative;
            text-align: left;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-wrap input {
            padding-left: 44px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            padding: 7px 16px;
            border-radius: 30px;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%       { transform: scale(1.3); opacity: 0.7; }
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: -6px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <!-- Ambient blobs -->
    <div class="blob" style="width:380px;height:380px; top:8%; left:6%;
         background:var(--primary); opacity:0.1;"></div>
    <div class="blob" style="width:320px;height:320px; bottom:10%; right:8%;
         background:var(--accent); opacity:0.07;"></div>

    <div class="glass-card login-card animate-in">

        <!-- Logo -->
        <div class="logo-icon">
            <i data-lucide="train-front" size="34" style="color:var(--primary);"></i>
        </div>

        <h1 style="font-size:1.9rem; font-weight:800; letter-spacing:-0.8px;">
            QuickRail
        </h1>
        <div class="divider"></div>
        <p style="color:var(--text-dim); font-size:0.8rem; text-transform:uppercase;
                  letter-spacing:2px; font-weight:600; margin-bottom:2.2rem;">
            Sign In
        </p>

        <!-- Form -->
        <div style="display:flex; flex-direction:column; gap:14px; margin-bottom:2rem;">

            <div class="input-wrap">
                <i data-lucide="user" size="16"></i>
                <input type="text" id="username" placeholder="Username"
                       autocomplete="username">
            </div>

            <div class="input-wrap">
                <i data-lucide="lock" size="16"></i>
                <input type="password" id="password" placeholder="Password"
                       autocomplete="current-password">
            </div>

            <p id="error-msg" class="error-msg">
                <i data-lucide="alert-circle" size="13"
                   style="vertical-align:middle; margin-right:4px;"></i>
                Please enter your username and password.
            </p>

            <button id="login-btn" onclick="handleLogin()"
                    style="width:100%; justify-content:center;
                           padding:1rem; font-size:0.95rem; margin-top:4px;">
                Sign In <i data-lucide="arrow-right" size="17"></i>
            </button>
        </div>

        <!-- Status -->
        <div style="border-top:1px solid var(--glass-border); padding-top:1.6rem;">
            <div class="status-badge">
                <span class="status-dot"></span>
                <p style="font-size:0.7rem; color:var(--success);
                          font-weight:700; letter-spacing:1px;">
                    NETWORK OPERATIONAL
                </p>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        function handleLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const err  = document.getElementById("error-msg");

            if (!user || !pass) {
                err.style.display = "block";
                lucide.createIcons();
                document.getElementById(user ? "password" : "username").focus();
                return;
            }

            err.style.display = "none";

            /* Simple visual feedback before redirect */
            const btn = document.getElementById("login-btn");
            btn.disabled     = true;
            btn.style.opacity = "0.7";
            btn.innerHTML    = `<span style="letter-spacing:1px;">Signing in...</span>`;

            setTimeout(() => { location.href = "/dashboard"; }, 600);
        }

        /* Allow Enter key on both fields */
        ["username", "password"].forEach(id => {
            document.getElementById(id)
                .addEventListener("keydown", e => {
                    if (e.key === "Enter") handleLogin();
                });
        });
    </script>
</body>
</html>
